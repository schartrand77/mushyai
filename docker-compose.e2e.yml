services:
  mushyai:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      RECONSTRUCTION_WORKER_URL: http://reconstruction-worker:8000
      RECONSTRUCTION_WORKER_TIMEOUT_MS: 8000
      RECONSTRUCTION_WORKER_RETRIES: 1
    depends_on:
      reconstruction-worker:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:3000/healthz || exit 1",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
  reconstruction-worker:
    build:
      context: .
      dockerfile: Dockerfile.reconstruction
    environment:
      RECONSTRUCTION_ARTIFACT_DIR: /tmp/mushyai-worker-artifacts
      RECONSTRUCTION_MODEL_PROVIDER: contour-prior-v1
      RECONSTRUCTION_MODEL_VERSION: 0.1.0
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  playwright:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    depends_on:
      mushyai:
        condition: service_healthy
    environment:
      PLAYWRIGHT_BASE_URL: http://mushyai:8080
      CI: "1"
    command: ["npx", "playwright", "test", "--config=playwright.config.js"]
